<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login | CATMA SAFE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .login-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: white; }
    .logo-catma { width: 100%; max-width: 200px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>

<div class="login-card">
  <img src="/portal_Catma/assets/images/Logo web.png" alt="CATMA SAFE MEXICO" class="logo-catma">

  <h4 class="text-center mb-4">Panel Administrativo</h4>

  <form action="/auth/login" method="POST">
    <div class="mb-3">
      <input type="text" name="user" class="form-control" placeholder="Usuario" required>
    </div>
    <div class="mb-3">
      <input type="password" name="pass" class="form-control" placeholder="Contraseña" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Ingresar</button>
  </form>
</div>

</body>
</html>
